x-common: &common
  volumes:
    - "./lm-config.yaml:/app/lm-config.yaml:ro"
  restart: on-failure

services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp-cuda
    restart: on-failure
    ports:
      - "8082:8082"
    volumes:
      - ./llamacpp/models:/models
      - ./llamacpp/llama_models_config.ini:/llama_models_config.ini
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --port 8082
      --models-dir /models
      --models-preset /llama_models_config.ini
      --host 0.0.0.0
      --parallel 2

  server:
    <<: *common
    build:
      context: ./papers-server
    container_name: papers-server
    environment:
      - SERVER_IP=0.0.0.0
      - LM_CONFIG_FILE=lm-config.yaml
    depends_on:
      - llamacpp

  postgres:
    image: postgres:16
    restart: on-failure
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: on-failure
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    ports:
      - 5678:5678
    links:
      - postgres
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./paper-export-client:/home/node/.n8n-files/paper-export-client
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  n8n-runner:
    image: n8nio/runners:latest
    restart: on-failure
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      - n8n
      - server

volumes:
  db_storage:
  n8n_storage:
  llamacpp_data: